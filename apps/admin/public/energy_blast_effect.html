<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Energy Blast Effect</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .container {
            max-width: 1200px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            margin: 10px 0;
        }
        label {
            display: inline-block;
            width: 150px;
            color: #00ffff;
        }
        input[type="range"] {
            width: 200px;
        }
        button {
            background: linear-gradient(45deg, #00ffff, #0080ff);
            border: none;
            padding: 12px 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }
        input[type="file"] {
            margin: 10px 0;
            padding: 10px;
            background: #3a3a3a;
            border: 2px solid #00ffff;
            border-radius: 5px;
            color: white;
        }
        canvas {
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .info {
            text-align: center;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ ANIME ENERGY BLAST CREATOR ⚡</h1>
        
        <div class="controls">
            <div class="control-group">
                <input type="file" id="imageInput" accept="image/*">
            </div>
            
            <div class="control-group">
                <label>Energy Intensity:</label>
                <input type="range" id="intensity" min="1" max="10" value="7" step="1">
                <span id="intensityValue">7</span>
            </div>
            
            <div class="control-group">
                <label>Blast Radius:</label>
                <input type="range" id="radius" min="50" max="300" value="150" step="10">
                <span id="radiusValue">150</span>
            </div>
            
            <div class="control-group">
                <label>Debris Amount:</label>
                <input type="range" id="debris" min="50" max="300" value="150" step="10">
                <span id="debrisValue">150</span>
            </div>
            
            <div class="control-group">
                <label>Energy Color:</label>
                <select id="colorScheme">
                    <option value="blue">Electric Blue</option>
                    <option value="purple">Purple Energy</option>
                    <option value="red">Fire Red</option>
                    <option value="green">Toxic Green</option>
                    <option value="gold">Golden Power</option>
                </select>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="generateEffect()">🔥 Generate Effect 🔥</button>
                <button onclick="downloadImage()">💾 Download Image</button>
                <button onclick="randomize()">🎲 Randomize</button>
            </div>
        </div>
        
        <canvas id="canvas"></canvas>
        <div class="info">Upload your image and click "Generate Effect" to create epic anime-style energy blasts!</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let uploadedImage = null;

        // Update slider values display
        document.getElementById('intensity').oninput = function() {
            document.getElementById('intensityValue').textContent = this.value;
        };
        document.getElementById('radius').oninput = function() {
            document.getElementById('radiusValue').textContent = this.value;
        };
        document.getElementById('debris').oninput = function() {
            document.getElementById('debrisValue').textContent = this.value;
        };

        // Handle image upload
        document.getElementById('imageInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        uploadedImage = img;
                        canvas.width = img.width;
                        canvas.height = img.height;
                        generateEffect();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        function getColorScheme(scheme) {
            const schemes = {
                blue: {
                    primary: ['rgba(0, 150, 255, ', 'rgba(0, 200, 255, ', 'rgba(100, 220, 255, '],
                    secondary: ['rgba(255, 255, 255, ', 'rgba(150, 230, 255, '],
                    glow: 'rgba(0, 200, 255, 0.3)'
                },
                purple: {
                    primary: ['rgba(150, 0, 255, ', 'rgba(200, 0, 255, ', 'rgba(220, 100, 255, '],
                    secondary: ['rgba(255, 150, 255, ', 'rgba(255, 255, 255, '],
                    glow: 'rgba(200, 0, 255, 0.3)'
                },
                red: {
                    primary: ['rgba(255, 50, 0, ', 'rgba(255, 100, 0, ', 'rgba(255, 150, 50, '],
                    secondary: ['rgba(255, 200, 0, ', 'rgba(255, 255, 100, '],
                    glow: 'rgba(255, 100, 0, 0.3)'
                },
                green: {
                    primary: ['rgba(0, 255, 100, ', 'rgba(0, 255, 150, ', 'rgba(100, 255, 150, '],
                    secondary: ['rgba(150, 255, 150, ', 'rgba(200, 255, 200, '],
                    glow: 'rgba(0, 255, 100, 0.3)'
                },
                gold: {
                    primary: ['rgba(255, 200, 0, ', 'rgba(255, 220, 50, ', 'rgba(255, 240, 100, '],
                    secondary: ['rgba(255, 255, 200, ', 'rgba(255, 255, 255, '],
                    glow: 'rgba(255, 200, 0, 0.3)'
                }
            };
            return schemes[scheme] || schemes.blue;
        }

        function generateEffect() {
            if (!uploadedImage) {
                alert('Please upload an image first!');
                return;
            }

            const intensity = parseInt(document.getElementById('intensity').value);
            const radius = parseInt(document.getElementById('radius').value);
            const debrisAmount = parseInt(document.getElementById('debris').value);
            const colorScheme = getColorScheme(document.getElementById('colorScheme').value);

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw original image
            ctx.drawImage(uploadedImage, 0, 0);

            // Calculate center point (person's position)
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Create energy blast effect
            ctx.save();

            // Draw radial energy beams
            const beamCount = 20 + (intensity * 3);
            for (let i = 0; i < beamCount; i++) {
                const angle = (Math.PI * 2 / beamCount) * i + Math.random() * 0.3;
                const length = radius + Math.random() * radius;
                const width = 10 + Math.random() * (intensity * 5);

                const endX = centerX + Math.cos(angle) * length;
                const endY = centerY + Math.sin(angle) * length;

                // Gradient beam
                const gradient = ctx.createLinearGradient(centerX, centerY, endX, endY);
                const colors = colorScheme.primary;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                gradient.addColorStop(0, color + '0.8)');
                gradient.addColorStop(0.5, color + '0.6)');
                gradient.addColorStop(1, color + '0)');

                ctx.strokeStyle = gradient;
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }

            // Draw energy rings
            const ringCount = 8 + intensity;
            for (let i = 0; i < ringCount; i++) {
                const ringRadius = 50 + Math.random() * (radius * 2);
                const ringWidth = 5 + Math.random() * 20;
                
                const colors = colorScheme.primary;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                ctx.strokeStyle = color + '0.5)';
                ctx.lineWidth = ringWidth;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Draw central energy core
            const coreGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100);
            coreGradient.addColorStop(0, colorScheme.secondary[1] + '0.9)');
            coreGradient.addColorStop(0.3, colorScheme.secondary[0] + '0.7)');
            coreGradient.addColorStop(0.6, colorScheme.primary[0] + '0.4)');
            coreGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = coreGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw debris and particles
            for (let i = 0; i < debrisAmount; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = 2 + Math.random() * 10;
                
                // Debris colors
                const debrisColors = [
                    'rgba(100, 100, 100, 0.8)',
                    'rgba(150, 150, 150, 0.7)',
                    'rgba(80, 80, 80, 0.9)',
                    colorScheme.primary[0] + '0.6)'
                ];
                
                ctx.fillStyle = debrisColors[Math.floor(Math.random() * debrisColors.length)];
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Add impact cracks
            const crackCount = 10 + intensity;
            for (let i = 0; i < crackCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const length = 100 + Math.random() * 200;
                const startX = centerX + Math.cos(angle) * 50;
                const startY = centerY + Math.sin(angle) * 50;
                const endX = startX + Math.cos(angle) * length;
                const endY = startY + Math.sin(angle) * length;

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.lineWidth = 2 + Math.random() * 3;
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }

            // Add atmospheric glow
            const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius * 3);
            glowGradient.addColorStop(0, colorScheme.glow);
            glowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add screen shake/distortion effect
            const distortionStrength = intensity * 2;
            for (let i = 0; i < 5; i++) {
                const offsetX = (Math.random() - 0.5) * distortionStrength;
                const offsetY = (Math.random() - 0.5) * distortionStrength;
                
                ctx.globalAlpha = 0.1;
                ctx.drawImage(canvas, offsetX, offsetY);
            }

            ctx.restore();
        }

        function randomize() {
            document.getElementById('intensity').value = 3 + Math.floor(Math.random() * 8);
            document.getElementById('radius').value = 80 + Math.floor(Math.random() * 200);
            document.getElementById('debris').value = 100 + Math.floor(Math.random() * 200);
            
            const colors = ['blue', 'purple', 'red', 'green', 'gold'];
            document.getElementById('colorScheme').value = colors[Math.floor(Math.random() * colors.length)];
            
            document.getElementById('intensityValue').textContent = document.getElementById('intensity').value;
            document.getElementById('radiusValue').textContent = document.getElementById('radius').value;
            document.getElementById('debrisValue').textContent = document.getElementById('debris').value;
            
            generateEffect();
        }

        function downloadImage() {
            if (!uploadedImage) {
                alert('Please generate an effect first!');
                return;
            }
            
            const link = document.createElement('a');
            link.download = 'anime_energy_blast.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
