<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .header p {
        opacity: 0.9;
        font-size: 1.1rem;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }

      .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
      }

      .stat-label {
        font-size: 0.875rem;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: #1f2937;
      }

      .stat-value.positive {
        color: #10b981;
      }

      .stat-value.negative {
        color: #ef4444;
      }

      .main-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .card h2 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #1f2937;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: #374151;
        font-weight: 500;
        font-size: 0.9rem;
      }

      input,
      select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.2s;
        font-family: inherit;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .button-group {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 14px 24px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }

      .btn-income {
        background: #10b981;
        color: white;
      }

      .btn-income:hover {
        background: #059669;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(16, 185, 129, 0.3);
      }

      .btn-expense {
        background: #ef4444;
        color: white;
      }

      .btn-expense:hover {
        background: #dc2626;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(239, 68, 68, 0.3);
      }

      .transaction-list {
        max-height: 500px;
        overflow-y: auto;
      }

      .transaction-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px;
        margin-bottom: 10px;
        background: #f9fafb;
        border-radius: 12px;
        border-left: 4px solid transparent;
        transition: all 0.2s;
      }

      .transaction-item:hover {
        background: #f3f4f6;
        transform: translateX(4px);
      }

      .transaction-item.income {
        border-left-color: #10b981;
      }

      .transaction-item.expense {
        border-left-color: #ef4444;
      }

      .transaction-info {
        flex: 1;
      }

      .transaction-source {
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 4px;
      }

      .transaction-category {
        font-size: 0.85rem;
        color: #6b7280;
      }

      .transaction-amount {
        font-weight: 700;
        font-size: 1.1rem;
      }

      .transaction-amount.income {
        color: #10b981;
      }

      .transaction-amount.expense {
        color: #ef4444;
      }

      .transaction-date {
        font-size: 0.8rem;
        color: #9ca3af;
        margin-left: 16px;
      }

      .delete-btn {
        background: #fee;
        color: #ef4444;
        padding: 8px 12px;
        border-radius: 8px;
        margin-left: 12px;
        cursor: pointer;
        border: none;
        font-size: 0.85rem;
        transition: all 0.2s;
      }

      .delete-btn:hover {
        background: #fdd;
        transform: scale(1.05);
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #9ca3af;
      }

      .empty-state svg {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
        opacity: 0.5;
      }

      @media (max-width: 768px) {
        .main-content {
          grid-template-columns: 1fr;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }

        .header h1 {
          font-size: 2rem;
        }
      }

      /* Custom scrollbar */
      .transaction-list::-webkit-scrollbar {
        width: 8px;
      }

      .transaction-list::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }

      .transaction-list::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      .transaction-list::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>💰 Expense Tracker</h1>
        <p>Track your income and expenses effortlessly</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Balance</div>
          <div class="stat-value" id="totalBalance">$0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This Month Income</div>
          <div class="stat-value positive" id="thisMonthIncome">$0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This Month Expenses</div>
          <div class="stat-value negative" id="thisMonthExpense">$0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last Month Balance</div>
          <div class="stat-value" id="lastMonthBalance">$0.00</div>
        </div>
      </div>

      <div class="main-content">
        <div class="card">
          <h2>Add Transaction</h2>
          <form id="transactionForm">
            <div class="form-group">
              <label for="source">Source/Description</label>
              <input
                type="text"
                id="source"
                placeholder="e.g., Salary, Freelance, Rent"
                required
              />
            </div>
            <div class="form-group">
              <label for="category">Category</label>
              <input
                type="text"
                id="category"
                placeholder="e.g., Work, Food, Housing"
                required
              />
            </div>
            <div class="form-group">
              <label for="amount">Amount</label>
              <input
                type="number"
                id="amount"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date" required />
            </div>
            <div class="button-group">
              <button type="submit" class="btn-income" data-type="income">
                + Add Income
              </button>
              <button type="submit" class="btn-expense" data-type="expense">
                - Add Expense
              </button>
            </div>
          </form>
        </div>

        <div class="card">
          <h2>Recent Transactions</h2>
          <div class="transaction-list" id="transactionList">
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                />
              </svg>
              <p>No transactions yet. Add your first one!</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      class ExpenseTracker {
        constructor() {
          this.transactions = this.loadTransactions();
          this.init();
        }

        init() {
          this.setupEventListeners();
          this.updateUI();
          document.getElementById("date").valueAsDate = new Date();
        }

        setupEventListeners() {
          const form = document.getElementById("transactionForm");
          const buttons = form.querySelectorAll('button[type="submit"]');

          buttons.forEach((button) => {
            button.addEventListener("click", (e) => {
              e.preventDefault();
              const type = button.dataset.type;
              this.addTransaction(type);
            });
          });
        }

        addTransaction(type) {
          const source = document.getElementById("source").value.trim();
          const category = document.getElementById("category").value.trim();
          const amount = parseFloat(document.getElementById("amount").value);
          const date = document.getElementById("date").value;

          if (!source || !category || !amount || !date) {
            alert("Please fill in all fields");
            return;
          }

          const transaction = {
            id: Date.now(),
            type,
            source,
            category,
            amount,
            date,
            timestamp: new Date().getTime(),
          };

          this.transactions.push(transaction);
          this.saveTransactions();
          this.updateUI();
          this.resetForm();
        }

        deleteTransaction(id) {
          this.transactions = this.transactions.filter((t) => t.id !== id);
          this.saveTransactions();
          this.updateUI();
        }

        updateUI() {
          this.updateStats();
          this.renderTransactions();
        }

        updateStats() {
          const now = new Date();
          const currentMonth = now.getMonth();
          const currentYear = now.getFullYear();
          const lastMonth = currentMonth === 0 ? 11 : currentMonth - 1;
          const lastMonthYear =
            currentMonth === 0 ? currentYear - 1 : currentYear;

          let totalBalance = 0;
          let thisMonthIncome = 0;
          let thisMonthExpense = 0;
          let lastMonthBalance = 0;

          this.transactions.forEach((t) => {
            const tDate = new Date(t.date);
            const tMonth = tDate.getMonth();
            const tYear = tDate.getFullYear();
            const amount = t.type === "income" ? t.amount : -t.amount;

            totalBalance += amount;

            if (tMonth === currentMonth && tYear === currentYear) {
              if (t.type === "income") {
                thisMonthIncome += t.amount;
              } else {
                thisMonthExpense += t.amount;
              }
            }

            if (tMonth === lastMonth && tYear === lastMonthYear) {
              lastMonthBalance += amount;
            }
          });

          document.getElementById("totalBalance").textContent =
            this.formatCurrency(totalBalance);
          document.getElementById("thisMonthIncome").textContent =
            this.formatCurrency(thisMonthIncome);
          document.getElementById("thisMonthExpense").textContent =
            this.formatCurrency(thisMonthExpense);
          document.getElementById("lastMonthBalance").textContent =
            this.formatCurrency(lastMonthBalance);
        }

        renderTransactions() {
          const listEl = document.getElementById("transactionList");

          if (this.transactions.length === 0) {
            listEl.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <p>No transactions yet. Add your first one!</p>
                        </div>
                    `;
            return;
          }

          const sorted = [...this.transactions].sort(
            (a, b) => b.timestamp - a.timestamp
          );

          listEl.innerHTML = sorted
            .map(
              (t) => `
                    <div class="transaction-item ${t.type}">
                        <div class="transaction-info">
                            <div class="transaction-source">${t.source}</div>
                            <div class="transaction-category">${t.category}</div>
                        </div>
                        <div class="transaction-amount ${t.type}">
                            ${t.type === "income" ? "+" : "-"}${this.formatCurrency(t.amount)}
                        </div>
                        <div class="transaction-date">${this.formatDate(t.date)}</div>
                        <button class="delete-btn" onclick="tracker.deleteTransaction(${t.id})">Delete</button>
                    </div>
                `
            )
            .join("");
        }

        formatCurrency(amount) {
          return new Intl.NumberFormat("en-US", {
            style: "currency",
            currency: "USD",
          }).format(Math.abs(amount));
        }

        formatDate(dateString) {
          const date = new Date(dateString);
          return date.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric",
          });
        }

        resetForm() {
          document.getElementById("transactionForm").reset();
          document.getElementById("date").valueAsDate = new Date();
        }

        saveTransactions() {
          localStorage.setItem(
            "transactions",
            JSON.stringify(this.transactions)
          );
        }

        loadTransactions() {
          const data = localStorage.getItem("transactions");
          return data ? JSON.parse(data) : [];
        }
      }

      const tracker = new ExpenseTracker();
    </script>
  </body>
</html>
